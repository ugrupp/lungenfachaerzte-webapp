[build]
  command = "sed -i \"s|CRAFT_URL_PLACEHOLDER|${CRAFT_URL}|g\" netlify.toml && vite build"
  dir = "dist/client"

[dev]
  command = "pnpm dev"
  targetPort = 3000
  port = 8888

[[redirects]]
  from = "/sitemap*"
  to = "CRAFT_URL_PLACEHOLDER/sitemap:splat"
  status = 200
  force = true

# Vite-hashed assets (JS/CSS) — immutable, cache 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
